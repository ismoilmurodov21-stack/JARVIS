    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial Black', 'Impact', sans-serif;
        }

        .jarvis-core {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0c10;
            position: relative;
        }

        .jarvis-name {
            font-size: clamp(3rem, 20vw, 12rem);
            font-weight: 900;
            color: #00aeff;
            text-shadow: 0 0 40px #006eff, 2px 2px 10px black;
            letter-spacing: 0.15em;
            transform: skew(-2deg);
            white-space: nowrap;
            padding: 0 0.2em;
            animation: glow 3s infinite ease-in-out;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 40px #006eff, 2px 2px 10px black; }
            50% { text-shadow: 0 0 90px #00aeff, 2px 2px 20px black; }
            100% { text-shadow: 0 0 40px #006eff, 2px 2px 10px black; }
        }

        .status-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 30px #f44;
            margin-top: 30px;
            transition: all 0.2s ease;
        }

        .status-led.awake {
            background: #44ff44;
            box-shadow: 0 0 40px #4f4;
            animation: pulse 1s infinite;
        }

        .status-led.thinking {
            background: #ffaa00;
            box-shadow: 0 0 40px #ffaa00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hidden-message {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: #3a6a8f;
            font-family: monospace;
            opacity: 0.7;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #3a6a8f;
            z-index: 10;
        }
    </style>

            function log(msg) {
                console.log(msg);
                statusMsg.textContent = msg;
            }

            function speak(text) {
                if (!synthesis) {
                    log('Синтез речи недоступен');
                    return;
                }
                synthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 0.95;
                utterance.pitch = 0.9;
                utterance.volume = currentVolume;

                const voices = synthesis.getVoices();
                if (voices.length) {
                    let maleVoice = voices.find(v => 
                        v.lang.includes('ru') && 
                        (v.name.toLowerCase().includes('mikhail') ||
                         v.name.toLowerCase().includes('pavel') ||
                         v.name.toLowerCase().includes('male') ||
                         v.name.toLowerCase().includes('мужской'))
                    );
                    if (!maleVoice) maleVoice = voices.find(v => v.lang.includes('ru'));
                    if (maleVoice) utterance.voice = maleVoice;
                }

                utterance.onstart = () => log('JARVIS: ' + text);
                utterance.onerror = (e) => log('Ошибка речи: ' + e.error);
                synthesis.speak(utterance);
            }

            function setVolume(level) {
                if (level < 0) level = 0;
                if (level > 1) level = 1;
                currentVolume = level;
                speak('Громкость ' + Math.round(level*100) + '%');
            }

            function volumeUp() {
                setVolume(currentVolume + 0.1);
            }

            function volumeDown() {
                setVolume(currentVolume - 0.1);
            }

            function setAwake(state) {
                isAwake = state;
                led.classList.toggle('awake', state);
                led.classList.remove('thinking');
            }

            function setThinking(state) {
                if (state) {
                    led.classList.add('thinking');
                    led.classList.remove('awake');
                } else {
                    led.classList.remove('thinking');
                }
            }

            function openApp(appName) {
                const key = appName.toLowerCase();
                for (let k in APPS) {
                    if (key.includes(k) || k.includes(key)) {
                        window.open(APPS[k], '_blank');
                        speak('Открываю ' + appName);
                        return true;
                    }
                }
                speak('Приложение ' + appName + ' не найдено');
                return false;
            }

            function searchGoogle(query) {
                if (query) {
                    window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
                    speak('Ищу ' + query);
                } else {
                    speak('Что найти?');
                }
            }

            function getWeatherByLocation() {
                if (!navigator.geolocation) {
                    speak('Геолокация не поддерживается');
                    return;
                }
                setThinking(true);
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric&lang=ru`)
                            .then(response => response.json())
                            .then(data => {
                                setThinking(false);
                                if (data.cod === 200) {
                                    const city = data.name;
                                    const temp = Math.round(data.main.temp);
                                    const desc = data.weather[0].description;
                                    const feels = Math.round(data.main.feels_like);
                                    speak(`В ${city} сейчас ${temp} градусов, ${desc}. Ощущается как ${feels}.`);
                                } else {
                                    speak('Не удалось получить погоду');
                                }
                            })
                            .catch(() => {
                                setThinking(false);
                                speak('Ошибка получения погоды');
                            });
                    },
                    (error) => {
                        setThinking(false);
                        speak('Не удалось определить местоположение');
                    }
                );
            }

                const randomIndex = Math.floor(Math.random() * JOKES.length);

                    const link = document.createElement('a');
                    link.download = 'jarvis_screenshot_' + Date.now() + '.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    speak('Скриншот сохранён');
                }).catch(() => {
                    speak('Не удалось сделать скриншот');
                });
            }

            async function askGemini(prompt) {
                if (!GEMINI_API_KEY) {
                    speak('API ключ для Gemini не настроен.');
                    return null;
                }
                setThinking(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    setThinking(false);
                    if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        return 'Извините, я не смог обработать запрос.';
                    }
                } catch (error) {
                    setThinking(false);
                    return 'Ошибка соединения с Gemini.';
                }
            }

            async function processCommand(rawText) {
                if (!rawText || isProcessing) return;
                isProcessing = true;
                const cmd = rawText.toLowerCase().trim();
                log('Распознано: ' + rawText);

                if (!isAwake) {
                    if (cmd.includes(WAKE_WORD)) {
                        setAwake(true);
                        speak('Слушаю, сэр.');
                    }
                    isProcessing = false;
                    return;
                }

                if (cmd.includes('стоп') || cmd.includes('хватит') || cmd.includes('замолчи')) {
                    setAwake(false);
                    speak('Отключаюсь.');
                    isProcessing = false;
                    return;
                }

                if (cmd.includes('громче')) { volumeUp(); isProcessing = false; return; }
                if (cmd.includes('тише')) { volumeDown(); isProcessing = false; return; }
                if (cmd.includes('громкость')) {
                    let match = cmd.match(/\d+/);
                    if (match) {
                        let val = parseInt(match[0]);
                        if (val >= 0 && val <= 100) setVolume(val / 100);
                        else speak('Громкость должна быть от 0 до 100');
                    } else {
                        speak('Сейчас громкость ' + Math.round(currentVolume*100) + '%');
                    }
                    isProcessing = false;
                    return;
                }

                let appFound = false;
                for (let app in APPS) {
                    if (cmd.includes('открой ' + app) || cmd.includes(app)) {
                        openApp(app);
                        appFound = true;
                        break;
                    }
                }
                if (appFound) { isProcessing = false; return; }

                if (cmd.includes('найди') || cmd.includes('поиск') || cmd.includes('погугли')) {
                    let query = cmd.replace(/найди|поиск|погугли/gi, '').trim();
                    searchGoogle(query);
                    isProcessing = false;
                    return;
                }

                if (cmd.includes('погода')) {
                    getWeatherByLocation();
                    isProcessing = false;
                    return;
                }

                if (cmd.includes('шутку') || cmd.includes('анекдот') || cmd.includes('рассмеши')) {
                    tellJoke();
                    isProcessing = false;
                    return;
                }

                if (cmd.includes('скриншот') || cmd.includes('снимок экрана') || cmd.includes('фото экрана')) {
                    takeScreenshot();
                    isProcessing = false;
                    return;
                }

                if (cmd.includes('что ты умеешь') || cmd.includes('помощь') || cmd.includes('справка')) {
                    speak('Я могу: открыть приложения (телеграм, ютуб, тикток и др.), искать в Google, показывать погоду, рассказывать шутки, управлять громкостью, делать скриншот, отвечать на вопросы через Gemini. Скажите "стоп" для отключения.');
                    isProcessing = false;
                    return;
                }

                if (isGeminiEnabled) {
                    const geminiAnswer = await askGemini(rawText);
                    if (geminiAnswer) speak(geminiAnswer);
                } else {
                    speak('Не понял команду. Скажите "помощь".');
                }
                isProcessing = false;
            }

            function initRecognition() {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRec) {
                    log('❌ Браузер не поддерживает распознавание речи.');
                    return null;
                }
                const rec = new SpeechRec();
                rec.continuous = false;
                rec.interimResults = false;
                rec.lang = 'ru-RU';
                rec.onstart = () => log('🎤 Микрофон активирован');
                rec.onresult = (e) => processCommand(e.results[0][0].transcript);
                rec.onerror = (e) => {
                    log('❌ Ошибка микрофона: ' + e.error);
                    if (e.error === 'not-allowed') {
                        micPermission = false;
                        statusMsg.textContent = '❌ Нет доступа к микрофону. Разрешите доступ и обновите страницу.';
                    }
                };
                rec.onend = () => { if (micPermission) try { rec.start(); } catch(e){} };
                return rec;
            }

            function requestMicAndStart() {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        stream.getTracks().forEach(t => t.stop());
                        micPermission = true;
                        log('✅ Микрофон доступен. Скажите "Джарвис".');
                        statusMsg.textContent = 'Скажите "Джарвис" для активации';
                        if (recognition) try { recognition.start(); } catch(e){}
                    })
                    .catch(() => {
                        micPermission = false;
                        log('❌ Нет доступа к микрофону.');
                        statusMsg.textContent = '❌ Нет доступа к микрофону. Разрешите доступ.';
                    });
            }

            recognition = initRecognition();
            if (synthesis) {
                synthesis.getVoices();
                if (synthesis.onvoiceschanged) synthesis.onvoiceschanged = () => {};
            }
            requestMicAndStart();
            setAwake(false);
        })();
    </script>
