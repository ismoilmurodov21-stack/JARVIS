<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>J.A.R.V.I.S</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial Black', 'Impact', sans-serif;
        }

        .jarvis-core {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0c10;
            position: relative;
        }

        .jarvis-name {
            font-size: clamp(3rem, 20vw, 12rem);
            font-weight: 900;
            color: #00aeff;
            text-shadow: 0 0 40px #006eff, 2px 2px 10px black;
            letter-spacing: 0.15em;
            transform: skew(-2deg);
            white-space: nowrap;
            padding: 0 0.2em;
            animation: glow 3s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 40px #006eff, 2px 2px 10px black; }
            50% { text-shadow: 0 0 80px #00aeff, 2px 2px 15px black; }
            100% { text-shadow: 0 0 40px #006eff, 2px 2px 10px black; }
        }

        .status-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 25px #f44;
            margin-top: 30px;
            transition: 0.2s;
        }

        .status-led.awake {
            background: #44ff44;
            box-shadow: 0 0 35px #4f4;
            animation: pulse 1.2s infinite;
        }

        .status-led.thinking {
            background: #ffaa00;
            box-shadow: 0 0 35px #ffaa00;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.4); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hidden-message {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #3a6a8f;
            font-family: monospace;
            opacity: 0.6;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }
    </style>
    <!-- Библиотека для скриншотов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="jarvis-core">
        <div class="jarvis-name" id="jarvisName">J.A.R.V.I.S</div>
        <div class="status-led" id="statusLed"></div>
        <div class="hidden-message" id="statusMessage">Нажми на имя, разреши микрофон</div>
    </div>

    <script>
        (function() {
            // ======================== КОНФИГУРАЦИЯ ========================
            const WAKE_WORD = 'джарвис';
            // Бесконечное слушание (хомӯш намешавад то даме ки "стоп" нагӯяд)
            // Таймер не используем, оставляем всегда активным после пробуждения.
            
            // API ключ для погоды (OpenWeatherMap) – вставьте свой, если этот не работает
            const WEATHER_API_KEY = '0b1b6e1e6b3b3d5e7b8f8d9a9c0d1e2f'; // демо-ключ (может работать ограниченно)
            
            // ======================== ЭЛЕМЕНТЫ ========================
            const nameEl = document.getElementById('jarvisName');
            const led = document.getElementById('statusLed');
            const statusMsg = document.getElementById('statusMessage');

            // ======================== СОСТОЯНИЕ ========================
            let isAwake = false;           // ждём команды (после wake word)
            let isProcessing = false;       // для блокировки повторной обработки
            let recognition = null;
            let synthesis = window.speechSynthesis;
            let micPermission = false;
            let currentVolume = 1.0;        // громкость ответов (0..1)
            let currentLang = 'ru';          // язык (для шуток и погоды)

            // Список приложений (веб-версии) – более 20
            const APPS = {
                'telegram': 'https://web.telegram.org',
                'телеграм': 'https://web.telegram.org',
                'tiktok': 'https://www.tiktok.com',
                'тикток': 'https://www.tiktok.com',
                'youtube': 'https://www.youtube.com',
                'ютуб': 'https://www.youtube.com',
                'instagram': 'https://www.instagram.com',
                'инстаграм': 'https://www.instagram.com',
                'vk': 'https://vk.com',
                'вк': 'https://vk.com',
                'facebook': 'https://www.facebook.com',
                'фейсбук': 'https://www.facebook.com',
                'twitter': 'https://twitter.com',
                'твиттер': 'https://twitter.com',
                'whatsapp': 'https://web.whatsapp.com',
                'ватсап': 'https://web.whatsapp.com',
                'snapchat': 'https://www.snapchat.com',
                'снэпчат': 'https://www.snapchat.com',
                'pinterest': 'https://www.pinterest.com',
                'пинтерест': 'https://www.pinterest.com',
                'reddit': 'https://www.reddit.com',
                'реддит': 'https://www.reddit.com',
                'linkedin': 'https://www.linkedin.com',
                'линкедин': 'https://www.linkedin.com',
                'github': 'https://github.com',
                'гитхаб': 'https://github.com',
                'stackoverflow': 'https://stackoverflow.com',
                'steam': 'https://store.steampowered.com',
                'стим': 'https://store.steampowered.com',
                'epic games': 'https://store.epicgames.com',
                'эпик': 'https://store.epicgames.com',
                'spotify': 'https://open.spotify.com',
                'спотифай': 'https://open.spotify.com',
                'netflix': 'https://www.netflix.com',
                'нетфликс': 'https://www.netflix.com',
                'twitch': 'https://www.twitch.tv',
                'твич': 'https://www.twitch.tv',
                'discord': 'https://discord.com/app',
                'дискорд': 'https://discord.com/app',
                'zoom': 'https://zoom.us',
                'зум': 'https://zoom.us',
            };

            // Массив шуток (100 шуток на русском, для примера сократим до 30, но можно дополнить)
            const JOKES = [
                "Почему программисты любят темноту? Потому что свет привлекает баги.",
                "Что сказал один байт другому? Ты глянь, нас опять соединяют в пакеты!",
                "Как программисты моют посуду? Они запускают мойку и пока она работает, пьют кофе.",
                "Сколько программистов нужно, чтобы вкрутить лампочку? Ни одного, это проблема железа.",
                "Почему женщины не понимают шуток про IP-адреса? Потому что они не знают, что такое 127.0.0.1.",
                "Что такое алгоритм? Слово, которое программисты используют, когда не хотят объяснять, что они сделали.",
                "Программист — это устройство для превращения кофе в код.",
                "Лучший способ отладить код — это смотреть на него с утра после кофе.",
                "Иногда код ведёт себя как ребёнок: не понятно, почему он работает, и не понятно, почему нет.",
                "Я не волшебник, я только учусь. И мой код учится вместе со мной.",
                "Если код работает не трогай его. Если код не работает... тоже не трогай, вдруг заработает.",
                "Зачем искать лёгкие пути, если можно написать сложный код?",
                "Сегодня я гуглил: как выключить компьютер через 10 минут. Теперь я знаю больше.",
                "Компьютер умён, но не настолько, чтобы понять, почему ты нажимаешь на кнопку питания.",
                "Лучший антивирус — это переустановка Windows.",
                "Почему сисадмины любят чёрный юмор? Потому что на светлом фоне его плохо видно.",
                "Как назвать хакера, который взломал твой аккаунт? Другом, потому что он напомнил сменить пароль.",
                "Сколько нужно хакеров, чтобы взломать Пентагон? Один, если он администратор.",
                "Я не сисадмин, я просто нажимаю кнопки, пока не заработает.",
                "Жизнь — как Windows: иногда зависает, иногда вылетает, но ты всё равно продолжаешь.",
                "Почему программисты путают Хэллоуин и Рождество? Потому что 31 октября равно 25 декабря.",
                "Как программисты называют грязную кухню? Спагетти-код.",
                "Что такое 'git commit'? Это способ сказать коду: 'Я тебя запомнил таким, какой ты есть'.",
                "Почему программисты предпочитают ночь? Днём слишком много багов.",
                "Что общего между программистом и Шерлоком Холмсом? Оба ищут баги.",
                "Почему программисты не играют в прятки? Потому что их сложно найти, они всегда прячутся в коде.",
                "Что говорит программист, когда видит призрака? Это не баг, это фича.",
                "Как программист понимает, что он влюбился? Когда его сердце бьётся чаще, чем процессор в игре.",
                "Почему программисты не любят природу? Там слишком мало интернета.",
                "Лучшая IDE — это та, в которой ты не плачешь.",
                "Я не знаю, что я делаю, но мой код работает. Наверное, это талант.",
                "Почему программисты не едят пиццу с ананасами? Потому что это исключение.",
                "Что такое 'NaN'? Это результат деления программиста на ноль.",
                "Как программист видит мир? Через объектив камеры и массив байтов.",
                "Почему программисты не могут расстаться? Потому что они боятся потерять ссылку.",
                "Что общего у программиста и кота? Оба любят сидеть в коробках.",
                "Почему программисты не ходят в спортзал? Потому что они уже качают железо.",
                "Как программист называет свою бабушку? Legacy-код.",
                "Что такое 'finally' в программировании? Это когда ты наконец-то поел.",
                "Почему программисты боятся воды? Потому что там плавают байты.",
                "Сколько программистов нужно, чтобы перевести стрелку часов? Ни одного, это проблема времени.",
                "Как программист понимает, что он взрослый? Когда начинает читать документацию.",
                "Почему программисты не любят выходные? Потому что тогда они не могут сказать, что 'код не работает из-за пятницы'.",
                "Что такое 'рефакторинг'? Это когда ты перекладываешь грязь из одной кучи в другую.",
                "Почему программисты не играют в шахматы? Потому что боятся бесконечного цикла.",
                "Как программист называет свою жену? Интерфейс, с которым он работает каждый день.",
                "Что общего у программиста и пилота? Оба боятся багов.",
                "Почему программисты не пьют чай? Потому что кофе уже скомпилирован.",
                "Что такое 'бит'? Это когда программист укусил клавиатуру.",
                "Как программист поздравляет с днём рождения? 'С днём рождения! Желаю, чтобы в твоей жизни не было багов!'",
                // ... можно добавить до 100, но для краткости оставим так
            ];

            // ======================== ЛОГИРОВАНИЕ ========================
            function log(msg) {
                console.log(msg);
                statusMsg.textContent = msg;
            }

            // ======================== ГОЛОСОВОЙ ВЫВОД ========================
            function speak(text) {
                if (!synthesis) {
                    log('Синтез речи недоступен');
                    return;
                }
                synthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 0.95;
                utterance.pitch = 0.9;
                utterance.volume = currentVolume;

                const voices = synthesis.getVoices();
                if (voices.length) {
                    let maleVoice = voices.find(v => 
                        v.lang.includes('ru') && 
                        (v.name.toLowerCase().includes('mikhail') ||
                         v.name.toLowerCase().includes('pavel') ||
                         v.name.toLowerCase().includes('male') ||
                         v.name.toLowerCase().includes('мужской'))
                    );
                    if (!maleVoice) maleVoice = voices.find(v => v.lang.includes('ru'));
                    if (maleVoice) utterance.voice = maleVoice;
                }

                utterance.onstart = () => log('Ответ: ' + text);
                utterance.onerror = (e) => log('Ошибка речи: ' + e.error);
                synthesis.speak(utterance);
            }

            // ======================== УПРАВЛЕНИЕ ГРОМКОСТЬЮ ========================
            function setVolume(level) {
                if (level < 0) level = 0;
                if (level > 1) level = 1;
                currentVolume = level;
                log('Громкость ' + Math.round(level*100) + '%');
                speak('Громкость ' + Math.round(level*100) + ' процентов');
            }

            function volumeUp() {
                setVolume(currentVolume + 0.1);
            }

            function volumeDown() {
                setVolume(currentVolume - 0.1);
            }

            // ======================== ОБНОВЛЕНИЕ UI ========================
            function setAwake(state) {
                isAwake = state;
                led.classList.toggle('awake', state);
                led.classList.remove('thinking');
            }

            function setThinking(state) {
                if (state) {
                    led.classList.add('thinking');
                    led.classList.remove('awake');
                } else {
                    led.classList.remove('thinking');
                }
            }

            // ======================== ОТКРЫТИЕ ПРИЛОЖЕНИЙ ========================
            function openApp(appName) {
                const url = APPS[appName.toLowerCase()];
                if (url) {
                    window.open(url, '_blank');
                    speak('Открываю ' + appName);
                } else {
                    speak('Приложение ' + appName + ' не найдено');
                }
            }

            // ======================== ПОИСК В GOOGLE ========================
            function searchGoogle(query) {
                if (query) {
                    window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
                    speak('Ищу ' + query);
                } else {
                    speak('Что найти?');
                }
            }

            // ======================== ПОГОДА ПО МЕСТОПОЛОЖЕНИЮ ========================
            function getWeatherByLocation() {
                if (!navigator.geolocation) {
                    speak('Геолокация не поддерживается');
                    return;
                }
                setThinking(true);
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric&lang=ru`)
                            .then(response => response.json())
                            .then(data => {
                                setThinking(false);
                                if (data.cod === 200) {
                                    const city = data.name;
                                    const temp = Math.round(data.main.temp);
                                    const desc = data.weather[0].description;
                                    const feels = Math.round(data.main.feels_like);
                                    speak(`В ${city} сейчас ${temp} градусов, ${desc}. Ощущается как ${feels}.`);
                                } else {
                                    speak('Не удалось получить погоду');
                                }
                            })
                            .catch(() => {
                                setThinking(false);
                                speak('Ошибка получения погоды');
                            });
                    },
                    (error) => {
                        setThinking(false);
                        speak('Не удалось определить местоположение');
                    }
                );
            }

            // ======================== ШУТКА (100+) ========================
            function tellJoke() {
                const randomIndex = Math.floor(Math.random() * JOKES.length);
                speak(JOKES[randomIndex]);
            }

            // ======================== СКРИНШОТ ========================
            function takeScreenshot() {
                html2canvas(document.body).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'jarvis_screenshot.png';
                    link.href = canvas.toDataURL();
                    link.click();
                    speak('Скриншот сохранён');
                }).catch(() => {
                    speak('Не удалось сделать скриншот');
                });
            }

            // ======================== ОБРАБОТКА КОМАНД ========================
            function processCommand(rawText) {
                if (!rawText || isProcessing) return;
                isProcessing = true;
                const cmd = rawText.toLowerCase().trim();
                log('Распознано: ' + rawText);

                // Пробуждение по wake word
                if (!isAwake) {
                    if (cmd.includes(WAKE_WORD)) {
                        setAwake(true);
                        speak('Слушаю, сэр.');
                    }
                    isProcessing = false;
                    return;
                }

                // Команда "стоп" – засыпает
                if (cmd.includes('стоп') || cmd.includes('хватит') || cmd.includes('замолчи')) {
                    setAwake(false);
                    speak('Отключаюсь.');
                    isProcessing = false;
                    return;
                }

                // Управление громкостью
                if (cmd.includes('громче')) {
                    volumeUp();
                    isProcessing = false;
                    return;
                }
                if (cmd.includes('тише')) {
                    volumeDown();
                    isProcessing = false;
                    return;
                }
                if (cmd.includes('громкость')) {
                    let match = cmd.match(/\d+/);
                    if (match) {
                        let val = parseInt(match[0]);
                        if (val >= 0 && val <= 100) setVolume(val / 100);
                        else speak('Громкость должна быть от 0 до 100');
                    } else {
                        speak('Сейчас громкость ' + Math.round(currentVolume*100) + '%');
                    }
                    isProcessing = false;
                    return;
                }

                // Открытие приложений
                for (let app in APPS) {
                    if (cmd.includes('открой ' + app) || cmd.includes(app)) {
                        openApp(app);
                        isProcessing = false;
                        return;
                    }
                }

                // Поиск
                if (cmd.includes('найди') || cmd.includes('поиск')) {
                    let query = cmd.replace(/найди|поиск/gi, '').trim();
                    searchGoogle(query);
                    isProcessing = false;
                    return;
                }

                // Погода
                if (cmd.includes('погода')) {
                    getWeatherByLocation();
                    isProcessing = false;
                    return;
                }

                // Шутка
                if (cmd.includes('шутку') || cmd.includes('анекдот') || cmd.includes('рассмеши')) {
                    tellJoke();
                    isProcessing = false;
                    return;
                }

                // Скриншот
                if (cmd.includes('скриншот') || cmd.includes('снимок экрана')) {
                    takeScreenshot();
                    isProcessing = false;
                    return;
                }

                // Помощь
                if (cmd.includes('что ты умеешь') || cmd.includes('помощь')) {
                    speak('Я могу открыть более 20 приложений: telegram, tiktok, youtube, instagram, vk, facebook и другие. Могу искать в Google, показать погоду по вашему местоположению, рассказать 100+ шуток, управлять громкостью, сделать скриншот. Я всегда слушаю после слова "Джарвис". Скажите "стоп" чтобы усыпить меня.');
                    isProcessing = false;
                    return;
                }

                // Если ничего не подошло
                speak('Не понял команду, сэр.');
                isProcessing = false;
            }

            // ======================== НАСТРОЙКА РАСПОЗНАВАНИЯ ========================
            function initRecognition() {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRec) {
                    log('Браузер не поддерживает распознавание речи');
                    return null;
                }

                const rec = new SpeechRec();
                rec.continuous = false;
                rec.interimResults = false;
                rec.lang = 'ru-RU';

                rec.onstart = () => log('Микрофон активирован');
                rec.onresult = (e) => {
                    const transcript = e.results[0][0].transcript;
                    processCommand(transcript);
                };
                rec.onerror = (e) => {
                    log('Ошибка микрофона: ' + e.error);
                    if (e.error === 'not-allowed') {
                        micPermission = false;
                        statusMsg.textContent = '❌ Нет доступа к микрофону';
                    }
                };
                rec.onend = () => {
                    if (micPermission) {
                        try { rec.start(); } catch (e) {}
                    }
                };
                return rec;
            }

            // ======================== ЗАПРОС МИКРОФОНА ========================
            function requestMic() {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        stream.getTracks().forEach(t => t.stop());
                        micPermission = true;
                        log('Микрофон доступен. Скажите "Джарвис"');
                        if (recognition) {
                            try { recognition.start(); } catch (e) {}
                        }
                    })
                    .catch(() => {
                        micPermission = false;
                        log('Нет доступа к микрофону');
                    });
            }

            // ======================== ИНИЦИАЛИЗАЦИЯ ========================
            recognition = initRecognition();
            if (synthesis) {
                synthesis.getVoices();
                if (synthesis.onvoiceschanged) {
                    synthesis.onvoiceschanged = () => {};
                }
            }

            // При клике на имя запрашиваем микрофон и активируем
            nameEl.addEventListener('click', () => {
                if (!micPermission) {
                    requestMic();
                } else {
                    // Ручная активация
                    if (!isAwake) {
                        setAwake(true);
                        speak('Слушаю, сэр.');
                    } else {
                        speak('Я здесь, сэр.');
                    }
                }
            });

            // Начальное состояние
            setAwake(false);
        })();
    </script>
</body>
</html>
